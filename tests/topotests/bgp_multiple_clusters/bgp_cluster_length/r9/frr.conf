hostname r9
!
interface lo
 ip address 10.0.0.9/32
!
! Connection to r5
interface r8-eth0
 ip address 10.5.9.2/24
!
! Connection to r4
interface r8-eth0
 ip address 10.4.9.2/24
!
router bgp 100
 bgp router-id 10.0.0.9
 no bgp network import-check
 maximum-paths ibgp 8 equal-cluster-length
 neighbor 10.5.9.1 remote-as 100
 neighbor 10.5.9.1 update-source 10.5.9.2
 neighbor 10.4.9.1 remote-as 100
 neighbor 10.4.9.1 update-source 10.4.9.2
 !
 address-family ipv4 unicast
  redistribute connected
  network 10.0.0.9/32
  neighbor 10.5.9.1 activate
  neighbor 10.5.9.1 activate
 exit-address-family
!

