hostname r5
!
interface lo
 ip address 10.0.0.5/32
!
! Connection to r6
interface r5-eth0
 ip address 10.5.6.1/24
!
! Connection to r4
interface r5-eth1
 ip address 10.4.5.2/24
!
! Connection to r7
interface r5-eth2
 ip address 10.5.7.1/24
!
! Connection to r8
interface r5-eth3
 ip address 10.5.8.1/24
!
! Connection to r9
interface r5-eth3
 ip address 10.5.9.1/24
!
router bgp 100
 bgp router-id 10.0.0.5
 bgp cluster-id 10.0.0.5
 bgp cluster-id per-neighbor 20.0.0.3
 bgp cluster-id per-neighbor 20.0.0.2
 no bgp network import-check
 maximum-paths ibgp 8 equal-cluster-length
 neighbor 10.5.6.2 remote-as 100
 neighbor 10.5.6.2 update-source 10.3.5.2
 neighbor 10.4.5.1 remote-as 100
 neighbor 10.4.5.1 update-source 10.4.5.2
 neighbor 10.5.7.2 remote-as 100
 neighbor 10.5.7.2 update-source 10.5.7.1
 neighbor 10.5.8.2 remote-as 100
 neighbor 10.5.8.2 update-source 10.5.8.1
 neighbor 10.5.9.2 remote-as 100
 neighbor 10.5.9.2 update-source 10.5.9.1
 !
 address-family ipv4 unicast
  network 10.0.0.5/32
  neighbor 10.5.6.2 activate
  neighbor 10.3.5.1 route-reflector-client
  neighbor 10.4.5.1 activate
  neighbor 10.5.7.2 activate
  neighbor 10.5.7.2 route-reflector-client
  neighbor 10.5.8.2 activate
  neighbor 10.5.8.2 route-reflector-client
  neighbor 10.5.9.2 activate

 exit-address-family
!

