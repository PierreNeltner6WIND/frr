hostname r6
!
interface lo
 ip address 10.0.0.6/32
!
! Connection to r5
interface r6-eth0
 ip address 10.5.6.2/24
!
router bgp 100
 bgp router-id 10.0.0.6
 no bgp network import-check
 maximum-paths ibgp 8 equal-cluster-length
 neighbor 10.5.6.1 remote-as 100
 neighbor 10.5.6.1 update-source 10.5.6.2
 !
 address-family ipv4 unicast
  redistribute connected
  network 10.0.0.6/32
  neighbor 10.5.6.1 activate
 exit-address-family
!

