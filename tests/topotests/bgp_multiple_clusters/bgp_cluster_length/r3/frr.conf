hostname r3
!
interface lo
 ip address 10.0.0.3/32
!
! Connection to r4
interface r1-eth1
 ip address 10.3.4.1/24
!
router bgp 100
 bgp router-id 10.0.0.3
 no bgp network import-check
 maximum-paths ibgp 8 equal-cluster-length
 neighbor 10.3.4.2 remote-as 100
 neighbor 10.3.4.2 update-source 10.3.4.1
 !
 address-family ipv4 unicast
  redistribute connected
  network 10.0.0.3/32
  neighbor 10.3.4.2 activate
 exit-address-family
!